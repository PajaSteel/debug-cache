<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<title>DEBUG.EXE</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
html,body{
    margin:0;
    padding:0;
    background:#000;
    color:#00ff66;
    font-family:Consolas,"Courier New",monospace;
    height:100%;
    overflow:hidden;
}
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        linear-gradient(rgba(0,0,0,.48), rgba(0,0,0,.74)),
        url("debug_background.png") center center / cover no-repeat;
    opacity:.75;
    z-index:-3;
}
body::after{
    content:"";
    position:fixed;
    inset:0;
    background:
        repeating-linear-gradient(
            to bottom,
            rgba(0,255,102,.045) 0px,
            rgba(0,255,102,.045) 1px,
            transparent 2px,
            transparent 4px
        );
    pointer-events:none;
    z-index:-2;
}
#frame{
    position:fixed;
    inset:16px;
    border:1px solid rgba(0,255,102,.35);
    box-shadow:
        0 0 18px rgba(0,255,102,.25),
        inset 0 0 38px rgba(0,255,102,.08);
    background:rgba(0,0,0,.56);
}
#screen{
    box-sizing:border-box;
    padding:22px;
    height:100vh;
    white-space:pre-wrap;
    overflow-y:auto;
    text-shadow:0 0 8px #00ff66;
    font-size:18px;
    line-height:1.35;
    position:relative;
    z-index:2;
}
#cmd{
    background:transparent;
    border:none;
    outline:none;
    color:#00ff66;
    font-family:inherit;
    font-size:inherit;
    width:60%;
    text-shadow:0 0 8px #00ff66;
}
.error{
    color:#ff4444;
    text-shadow:0 0 7px #ff4444;
}
</style>
</head>
<body>
<div id="frame"></div>
<div id="screen"></div>

<script>
const H = ["4ccd6db089bcf43a7ff9f0208440383a1005db084b3236509fd0865888ce7960", "bbb965ab0c80d6538cf2184babad2a564a010376712012bd07b0af92dcd3097d", "81b244f0e0d9cad62d18c4b18d560be060595880a0a5d0e2473d92d78ce8f971", "ef2d127de37b942baad06145e54b0c619a1f22327b2ebbcfbec78f5564afe39d", "05ada863a4cf9660fd8c68e2295f1d35b2264815f5b605003d6625bd9e0492cf"];
const E = [128, 103, 83, 101, 244, 78, 226, 93, 92, 147, 64, 223, 106, 99, 216, 221, 4, 73, 100, 25, 64, 241, 151, 40, 36, 211, 11, 44, 113, 39];
const Q = [
"Zadej obnovovaci hodnotu 1:",
"Zadej obnovovaci hodnotu 2:",
"Zadej obnovovaci hodnotu 3:",
"Zadej obnovovaci hodnotu 4:",
"Zadej obnovovaci hodnotu 5:"
];

let step = 0;
let solved = [];
const screen = document.getElementById("screen");

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

function append(t="",cls=""){
    const s=document.createElement("span");
    if(cls)s.className=cls;
    s.textContent=t+"\n";
    screen.appendChild(s);
    screen.scrollTop=screen.scrollHeight;
    return s;
}

async function typeLine(t="",cls=""){
    const s=document.createElement("span");
    if(cls)s.className=cls;
    screen.appendChild(s);
    for(const ch of t){
        s.textContent+=ch;
        screen.scrollTop=screen.scrollHeight;
        await sleep(5);
    }
    s.textContent+="\n";
}

function promptInput(){
    const wrap=document.createElement("span");
    wrap.textContent="> ";
    const input=document.createElement("input");
    input.id="cmd";
    input.autocomplete="off";
    input.spellcheck=false;
    wrap.appendChild(input);
    screen.appendChild(wrap);
    input.focus();

    input.addEventListener("keydown", async e=>{
        if(e.key==="Enter"){
            const v=input.value.trim();
            wrap.remove();
            append("> "+v);
            await handle(v);
        }
    });
}

async function sha256hex(text){
    const data=new TextEncoder().encode(text);
    const hash=await crypto.subtle.digest("SHA-256",data);
    return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

async function sha256bytes(text){
    const data=new TextEncoder().encode(text);
    const hash=await crypto.subtle.digest("SHA-256",data);
    return new Uint8Array(hash);
}

async function streamBytes(key,length){
    const seed=await sha256bytes(key);
    let out=[],counter=0;
    while(out.length<length){
        const c=new Uint8Array(4);
        c[0]=(counter>>>24)&255;
        c[1]=(counter>>>16)&255;
        c[2]=(counter>>>8)&255;
        c[3]=counter&255;

        const combined=new Uint8Array(seed.length+4);
        combined.set(seed);
        combined.set(c,seed.length);

        const h=await crypto.subtle.digest("SHA-256",combined);
        out.push(...new Uint8Array(h));
        counter++;
    }
    return out.slice(0,length);
}

async function decrypt(key){
    const st=await streamBytes(key,E.length);
    const bytes=E.map((v,i)=>v^st[i]);
    return new TextDecoder().decode(new Uint8Array(bytes));
}

function ask(){
    if(step>=Q.length){finish();return;}
    append("");
    append("C:\\CACHE\\SYSTEM> "+Q[step]);
    promptInput();
}

async function handle(value){
    const normalized=value.trim().toUpperCase();
    const h=await sha256hex(normalized);

    if(h===H[step]){
        solved.push(normalized);
        append("ACCESS GRANTED");
        append("Memory segment "+(step+1)+"/5 restored.");
        step++;
        if(step<Q.length)append("Input sequence: "+(step+1)+"/5");
        ask();
    } else {
        append("ACCESS DENIED","error");
        append("Wrong recovery value.","error");
        ask();
    }
}

function dots(name, width=38){
    if(name.length>=width) return name+" ";
    return name + ".".repeat(width-name.length) + " ";
}

async function task(name,duration,status="OK"){
    const row=document.createElement("span");
    screen.appendChild(row);

    const steps=40;
    const barWidth=28;

    for(let i=0;i<=steps;i++){
        const p=Math.round((i/steps)*100);
        const fill=Math.round((i/steps)*barWidth);
        const bar="█".repeat(fill)+"░".repeat(barWidth-fill);
        row.textContent=dots(name)+"["+bar+"] "+String(p).padStart(3," ")+"%";
        screen.scrollTop=screen.scrollHeight;

        let delay=duration/steps;
        if(p>90) delay*=1.8;
        if(p>97) delay*=2.4;
        await sleep(delay);
    }

    await sleep(250);
    row.textContent=dots(name)+"["+status+"]\n";
    screen.scrollTop=screen.scrollHeight;
    await sleep(180);
}

async function recoverySequence(){
    append("");
    await task("Building recovery key",1500);
    await task("Decrypting coordinate database",2000);
    await task("Checking segment table",800);
    await task("Verifying recovery key length",600);
    await task("Comparing memory mirror",900);
    await task("Calculating coordinate checksum",1200);
    await task("Validating encrypted payload",1000);
    await task("Repairing damaged sectors",1500);
    await task("Restoring final database index",1000);
    await task("Synchronizing cache pointer",800);
    await task("Unlocking coordinate record",1300);
    await task("Final checksum validation",5200,"PASSED");
}

async function finish(){
    const key=solved.join("|");

    await recoverySequence();
    await sleep(500);

    const txt=await decrypt(key);

    if(txt.startsWith("N 49")){
        append("");
        append("----------------------------------------");
        append("RECOVERY SUCCESSFUL");
        append("----------------------------------------");
        append("");
        append(txt);
        append("");
        append("Good luck.");
        append("");
        append("C:\\CACHE\\SYSTEM> _");
    } else {
        append("FATAL ERROR: KEY MISMATCH","error");
        append("Program data corrupted or wrong answers.","error");
    }
}

async function boot(){
    await typeLine("MS-DOS CACHE RECOVERY SYSTEM v1.0");
    await typeLine("Copyright (C) 1987-1993 Lost Coordinates Corp.");
    await typeLine("");
    await typeLine("C:\\>DEBUG.EXE");
    await typeLine("");
    await typeLine("Loading recovery module ............ OK");
    await typeLine("Checking memory blocks .............. OK");
    await typeLine("Scanning coordinate database ........ FAILED","error");
    await typeLine("ERROR 0x49: FINAL COORDINATES LOCKED","error");
    await typeLine("");
    await typeLine("Recovery values required.");
    await typeLine("Input sequence: 1/5");
    await typeLine("");
    ask();
}

document.addEventListener("click",()=>{
    const i=document.getElementById("cmd");
    if(i)i.focus();
});

boot();
</script>
</body>
</html>
