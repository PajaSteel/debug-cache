<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KEY UNLOCKER</title>
<style>
:root{
  --green:#39ff14;
  --red:#ff3333;
  --amber:#ffd34d;
  --bg:#020702;
}
*{box-sizing:border-box}
html,body{
  margin:0;
  min-height:100%;
  background:#000;
  color:var(--green);
  font-family:Consolas,"Courier New",monospace;
}
body{
  display:flex;
  justify-content:center;
  padding:16px;
}
.screen{
  width:min(980px,100%);
  border:2px solid var(--green);
  padding:18px;
  background:
    radial-gradient(circle at 78% 18%, rgba(57,255,20,.12), transparent 25%),
    linear-gradient(90deg, rgba(0,0,0,.95), rgba(0,40,0,.55)),
    var(--bg);
  box-shadow:0 0 28px rgba(57,255,20,.25);
}
h1{
  margin:0;
  font-size:40px;
  letter-spacing:2px;
}
.subtitle{
  border-bottom:1px dashed var(--green);
  padding-bottom:10px;
  margin-bottom:14px;
}
.status{
  border:1px solid var(--green);
  padding:12px;
  margin-bottom:14px;
}
.main{
  display:grid;
  grid-template-columns:330px 1fr;
  gap:16px;
  align-items:start;
}
.panel{
  border:1px solid var(--green);
  padding:14px;
}
.red{color:var(--red)}
.amber{color:var(--amber)}
.prompt{
  font-size:21px;
  margin-bottom:12px;
}
.inputline{
  width:100%;
  min-height:64px;
  border:1px solid var(--green);
  padding:12px;
  font-size:34px;
  letter-spacing:10px;
  margin-bottom:12px;
  overflow:hidden;
}
.keypad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
.key{
  height:60px;
  background:#001900;
  border:1px solid var(--green);
  color:var(--green);
  font-size:26px;
  font-family:inherit;
  cursor:pointer;
  touch-action:manipulation;
}
.key:hover{background:#063006}
.action{
  width:100%;
  margin-top:12px;
  padding:14px 18px;
  background:#001900;
  border:1px solid var(--green);
  color:var(--green);
  font-size:20px;
  font-family:inherit;
  cursor:pointer;
  touch-action:manipulation;
}
.progress{
  width:100%;
  height:18px;
  border:1px solid var(--green);
  margin:8px 0 12px;
}
.bar{
  height:100%;
  width:0%;
  background:var(--green);
  transition:width .45s;
}
.log{
  min-height:365px;
  max-height:520px;
  overflow:auto;
  white-space:pre-wrap;
  line-height:1.45;
  font-size:16px;
}
.code{
  font-size:60px;
  letter-spacing:14px;
  border:1px solid var(--green);
  display:inline-block;
  padding:12px 20px;
  margin-top:10px;
}
.cursor::after{
  content:"█";
  animation:blink 1s steps(1) infinite;
}

.status .code{
  color:var(--amber);
  border-color:var(--amber);
  font-size:42px;
  letter-spacing:10px;
  display:block;
  text-align:center;
}

@keyframes blink{50%{opacity:0}}

@media (max-width:760px){
  body{
    padding:8px;
  }
  .screen{
    padding:12px;
  }
  h1{
    font-size:30px;
  }
  .subtitle{
    font-size:14px;
  }
  .main{
    grid-template-columns:1fr;
    gap:12px;
  }
  .panel{
    padding:12px;
  }
  .input-panel{
    order:1;
  }
  .log-panel{
    order:2;
  }
  .prompt{
    font-size:19px;
  }
  .inputline{
    min-height:58px;
    font-size:30px;
  }
  .key{
    height:58px;
    font-size:25px;
  }
  .log{
    min-height:185px;
    max-height:260px;
    font-size:14px;
  }
  .code{
    font-size:48px;
    letter-spacing:10px;
  }
  .status .code{
    font-size:36px;
    letter-spacing:8px;
  }
}
</style>
</head>
<body>
<div class="screen">
  <h1>KEY UNLOCKER</h1>
  <div class="subtitle">DEBUG.EXE / CACHE RECOVERY MODULE</div>

  <div class="status" id="statusBox">
    <div>STATUS: <span class="red">LOCKED</span></div>
    <div>ERROR 0x49: FINAL LOCK CODE ENCRYPTED</div>
    <div>Recovery fragments required.</div>
  </div>

  <div class="main">
    <div class="panel input-panel">
      <div id="prompt" class="prompt">Zadej hodnotu z bloku číslo: 2</div>
      <div id="display" class="inputline cursor"></div>

      <div class="keypad">
        <button class="key" onclick="press('1')">1</button>
        <button class="key" onclick="press('2')">2</button>
        <button class="key" onclick="press('3')">3</button>
        <button class="key" onclick="press('4')">4</button>
        <button class="key" onclick="press('5')">5</button>
        <button class="key" onclick="press('6')">6</button>
        <button class="key" onclick="press('7')">7</button>
        <button class="key" onclick="press('8')">8</button>
        <button class="key" onclick="press('9')">9</button>
        <button class="key" onclick="clearValue()">CLR</button>
        <button class="key" onclick="press('0')">0</button>
        <button class="key" onclick="backspace()">DEL</button>
      </div>

      <button class="action" onclick="confirmValue()">ENTER</button>
    </div>

    <div class="panel log-panel">
      <div>DECRYPTION LOG</div>
      <div class="progress"><div id="bar" class="bar"></div></div>
      <div id="log" class="log cursor">C:\CACHE&gt; čekám na vstup...</div>
    </div>
  </div>
</div>

<script>
const blocks = [
  { number: 2, value: "83" },
  { number: 4, value: "5" },
  { number: 5, value: "149" }
];

const finalCode = "862";

let step = 0;
let current = "";
let entered = [];
let locked = false;

function press(n){
  if(locked) return;
  if(current.length < 8){
    current += n;
    updateDisplay();
  }
}

function clearValue(){
  if(locked) return;
  current = "";
  updateDisplay();
}

function backspace(){
  if(locked) return;
  current = current.slice(0,-1);
  updateDisplay();
}

function updateDisplay(){
  document.getElementById("display").textContent = current;
}

function updatePrompt(){
  if(step < blocks.length){
    document.getElementById("prompt").textContent =
      "Zadej hodnotu z bloku číslo: " + blocks[step].number;
  }
}

function confirmValue(){
  if(locked || current === "") return;

  entered.push(current);

  const log = document.getElementById("log");
  if(step === 0){
    log.classList.remove("cursor");
    log.innerHTML = "C:\\CACHE> key_unlocker.exe\n\n";
  }

  log.innerHTML += "BLOCK " + blocks[step].number + " VALUE RECEIVED: " + current + "\n";
  log.scrollTop = log.scrollHeight;

  step++;
  current = "";
  updateDisplay();

  if(step < blocks.length){
    updatePrompt();
  }else{
    locked = true;
    document.getElementById("prompt").textContent = "Všechny hodnoty zadány.";
    runUnlock();
  }
}

function wait(ms){
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function runUnlock(){
  const log = document.getElementById("log");
  const bar = document.getElementById("bar");

  await wait(400);
  log.innerHTML += "\nChecking block 2...\n";
  bar.style.width = "20%";
  log.scrollTop = log.scrollHeight;
  await wait(550);

  log.innerHTML += "Checking block 4...\n";
  bar.style.width = "40%";
  log.scrollTop = log.scrollHeight;
  await wait(550);

  log.innerHTML += "Checking block 5...\n";
  bar.style.width = "60%";
  log.scrollTop = log.scrollHeight;
  await wait(550);

  log.innerHTML += "Running checksum validation...\n";
  bar.style.width = "80%";
  log.scrollTop = log.scrollHeight;
  await wait(850);

  const ok =
    entered[0] === blocks[0].value &&
    entered[1] === blocks[1].value &&
    entered[2] === blocks[2].value;

  bar.style.width = "100%";
  await wait(450);

  if(ok){
    document.getElementById("statusBox").innerHTML =
      "<div>STATUS: <span class='amber'>UNLOCKED</span></div>" +
      "<div>FINAL LOCK CODE RECOVERED</div>" +
      "<div style='margin-top:12px'>LOCK CODE:</div>" +
      "<div class='code amber'>" + finalCode + "</div>";

    log.innerHTML += "\n<span class='amber'>ACCESS GRANTED</span>\n";
    log.innerHTML += "DATABASE UNLOCKED\n\n";

  }else{
    log.innerHTML += "\n<span class='red'>ACCESS DENIED</span>\n";
    log.innerHTML += "INVALID RECOVERY VALUES\n";
    log.innerHTML += "LOCK STATUS: LOCKED";
  }
  log.scrollTop = log.scrollHeight;
}

updatePrompt();
updateDisplay();
</script>
</body>
</html>
